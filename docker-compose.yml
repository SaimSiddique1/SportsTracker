services:
  postgres:
    image: postgres:16
    container_name: sportstracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: soccer_stats_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before running docker compose}
    ports:
      - "5433:5432"
    volumes:
      - soccer-stats-auth-postgres-data:/var/lib/postgresql/data

volumes:
  soccer-stats-auth-postgres-data:
